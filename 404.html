<head>

<title>404 — Kenny Brown</title>

<style>
  :root { --bg:#0a0e13; --fg:#d8e2e9; --muted:#93a2ad; --accent:#2fd7bf; }
  @media (prefers-color-scheme: light) { :root { --bg:#eef2f3; --fg:#0e1519; --muted:#4f5d64; --accent:#0a8f7e; } }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
    display: grid; place-items: center; text-align: center; padding: 2rem; line-height: 1.6;
  }
  .code { font-size: clamp(3.5rem, 12vw, 7rem); font-weight: 700; letter-spacing: -.04em; color: var(--accent); line-height: 1; }
  p { color: var(--muted); margin: 1rem 0 1.8rem; }
  a { color: var(--accent); text-decoration: none; border: 1px solid currentColor; border-radius: 6px; padding: .6rem 1.1rem; font-size: .9rem; }
  a:hover { background: var(--accent); color: var(--bg); }
</style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <p>That page wandered off. The code compiled; the route didn't.</p>
